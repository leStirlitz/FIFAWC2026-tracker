name: Update World Cup Bracket

on:
  schedule:
    - cron: '*/10 10-23 * 6-7 *'
    - cron: '*/10 0-6 * 6-7 *'
  workflow_dispatch:

jobs:
  update-bracket:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch ESPN and update data
        run: |
          node << 'EOF'
          const fs = require('fs');
          const https = require('https');

          const ESPN_TO_JSON = {
            'United States': 'USA',
            'Korea Republic': 'South Korea',
            "Côte d'Ivoire": 'Ivory Coast',
            "Cote d'Ivoire": 'Ivory Coast',
            'Bosnia-Herzegovina': 'Bosnia',
            'Bosnia and Herzegovina': 'Bosnia',
            'Republic of Ireland': 'Ireland',
            'Congo DR': 'DR Congo',
            'Cabo Verde': 'Cape Verde'
          };

          const LIVE_STATUSES = [
            'STATUS_IN_PROGRESS',
            'STATUS_HALFTIME',
            'STATUS_FIRST_HALF',
            'STATUS_SECOND_HALF',
            'STATUS_END_PERIOD',
            'STATUS_SHOOTOUT'
          ];

          const FINAL_STATUSES = [
            'STATUS_FULL_TIME',
            'STATUS_FINAL',
            'STATUS_FINAL_AET',
            'STATUS_FINAL_PEN',
            'STATUS_END_OF_EXTRATIME',
            'STATUS_END_OF_REGULATION'
          ];

          function fetchJson(url) {
            return new Promise((resolve, reject) => {
              const req = https.get(url, (res) => {
                let data = '';

                if (res.statusCode < 200 || res.statusCode >= 300) {
                  reject(new Error('HTTP ' + res.statusCode + ' for ' + url));
                  res.resume();
                  return;
                }

                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try {
                    resolve(JSON.parse(data));
                  } catch (e) {
                    reject(new Error('Failed to parse JSON from ' + url + ': ' + e.message));
                  }
                });
              });

              req.on('error', reject);
              req.setTimeout(15000, () => {
                req.destroy(new Error('Request timeout for ' + url));
              });
            });
          }

          function normalizeName(name) {
            return ESPN_TO_JSON[name] || name;
          }

          function sanitizeDisplayFlag(value) {
            return value || '';
          }

          function teamFromCompetitor(competitor) {
            if (!competitor || !competitor.team) return null;
            const team = competitor.team;
            return {
              code: team.abbreviation || '',
              name: normalizeName(team.displayName || team.name || ''),
              flag: sanitizeDisplayFlag(team.abbreviation || '')
            };
          }

          function teamsEqual(a, b) {
            return JSON.stringify(a || null) === JSON.stringify(b || null);
          }

          function getWinnerTeam(match) {
            if (!match || match.status !== 'completed' || !match.winner) return null;
            return match.winner === 'home' ? match.homeTeam : match.awayTeam;
          }

          function setTeamsIfChanged(match, homeTeam, awayTeam) {
            let changed = false;
            const sameHome = teamsEqual(match.homeTeam, homeTeam);
            const sameAway = teamsEqual(match.awayTeam, awayTeam);

            if (!sameHome || !sameAway) {
              match.homeTeam = homeTeam || null;
              match.awayTeam = awayTeam || null;
              changed = true;
            }

            const shouldBeScheduled = !!(homeTeam && awayTeam);
            const currentHasResult =
              match.homeScore !== null ||
              match.awayScore !== null ||
              match.winner ||
              match.status === 'completed' ||
              match.status === 'live';

            if (!shouldBeScheduled) {
              if (
                match.status !== 'pending' ||
                currentHasResult ||
                match.notes ||
                match.homePenalties !== undefined ||
                match.awayPenalties !== undefined
              ) {
                match.status = 'pending';
                match.homeScore = null;
                match.awayScore = null;
                match.winner = null;
                delete match.notes;
                delete match.homePenalties;
                delete match.awayPenalties;
                changed = true;
              }
            } else {
              if (match.status === 'pending') {
                match.status = 'scheduled';
                if (match.homeScore !== null || match.awayScore !== null || match.winner !== null) {
                  match.homeScore = null;
                  match.awayScore = null;
                  match.winner = null;
                }
                delete match.notes;
                delete match.homePenalties;
                delete match.awayPenalties;
                changed = true;
              }
            }

            return changed;
          }

          function advanceBracket(matchesJson) {
            let changed = false;
            const rounds = matchesJson.matches || {};

            if (rounds.qf?.[0]) changed = setTeamsIfChanged(rounds.qf[0], getWinnerTeam(rounds.r16?.[0]), getWinnerTeam(rounds.r16?.[1])) || changed;
            if (rounds.qf?.[1]) changed = setTeamsIfChanged(rounds.qf[1], getWinnerTeam(rounds.r16?.[4]), getWinnerTeam(rounds.r16?.[5])) || changed;
            if (rounds.qf?.[2]) changed = setTeamsIfChanged(rounds.qf[2], getWinnerTeam(rounds.r16?.[2]), getWinnerTeam(rounds.r16?.[3])) || changed;
            if (rounds.qf?.[3]) changed = setTeamsIfChanged(rounds.qf[3], getWinnerTeam(rounds.r16?.[6]), getWinnerTeam(rounds.r16?.[7])) || changed;

            if (rounds.sf?.[0]) changed = setTeamsIfChanged(rounds.sf[0], getWinnerTeam(rounds.qf?.[0]), getWinnerTeam(rounds.qf?.[2])) || changed;
            if (rounds.sf?.[1]) changed = setTeamsIfChanged(rounds.sf[1], getWinnerTeam(rounds.qf?.[1]), getWinnerTeam(rounds.qf?.[3])) || changed;

            if (rounds.final?.[0]) changed = setTeamsIfChanged(rounds.final[0], getWinnerTeam(rounds.sf?.[0]), getWinnerTeam(rounds.sf?.[1])) || changed;

            return changed;
          }

          function recalculateTournament(matchesJson) {
            const rounds = matchesJson.matches || {};
            const allMatches = Object.values(rounds).flat();

            let completed = 0;
            let shootouts = 0;

            for (const match of allMatches) {
              if (match.status === 'completed') {
                completed++;
                if (match.notes === 'PKs' || (match.homePenalties !== undefined && match.awayPenalties !== undefined)) {
                  shootouts++;
                }
              }
            }

            let stage = 'Round of 32';
            if (rounds.final?.[0]?.status === 'completed') {
              stage = 'Completed';
            } else if (rounds.final?.some(m => m.homeTeam && m.awayTeam)) {
              stage = 'Final';
            } else if (rounds.sf?.some(m => m.homeTeam && m.awayTeam)) {
              stage = 'Semifinals';
            } else if (rounds.qf?.some(m => m.homeTeam && m.awayTeam)) {
              stage = 'Quarterfinals';
            } else if (rounds.r16?.some(m => m.homeTeam && m.awayTeam)) {
              stage = 'Round of 16';
            }

            const nextTournament = {
              name: matchesJson.tournament?.name || 'FIFA World Cup 2026',
              stage,
              matchesPlayed: completed,
              totalKnockoutMatches: 16,
              penaltyShootouts: shootouts
            };

            const before = JSON.stringify(matchesJson.tournament || {});
            const after = JSON.stringify(nextTournament);

            if (before !== after) {
              matchesJson.tournament = nextTournament;
              return true;
            }

            return false;
          }

          function syncStatsSummary(matchesJson, statsJson) {
            let changed = false;
            const allMatches = Object.values(matchesJson.matches || {}).flat();

            const shootouts = allMatches.filter(m =>
              m.status === 'completed' &&
              (m.notes === 'PKs' || (m.homePenalties !== undefined && m.awayPenalties !== undefined))
            ).length;

            if (!statsJson.tournament) statsJson.tournament = {};

            if (statsJson.tournament.penaltyShootouts !== shootouts) {
              statsJson.tournament.penaltyShootouts = shootouts;
              changed = true;
            }

            return changed;
          }

          async function updateMatches(matchesJson) {
            console.log('Fetching ESPN World Cup scoreboard...');

            let espnData;
            try {
              espnData = await fetchJson('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard');
            } catch (e) {
              console.log('Failed to fetch ESPN scoreboard:', e.message);
              return false;
            }

            if (!espnData.events || espnData.events.length === 0) {
              console.log('No events found');
              return false;
            }

            console.log('Found ' + espnData.events.length + ' events');
            let anyUpdates = false;

            for (const event of espnData.events) {
              const comp = event.competitions && event.competitions[0];
              if (!comp) continue;

              const status = comp.status && comp.status.type && comp.status.type.name;
              const home = comp.competitors && comp.competitors.find(c => c.homeAway === 'home');
              const away = comp.competitors && comp.competitors.find(c => c.homeAway === 'away');

              if (!home || !away) continue;

              const espnHomeName = normalizeName(home.team.displayName || home.team.name);
              const espnAwayName = normalizeName(away.team.displayName || away.team.name);
              const homeScore = parseInt(home.score, 10) || 0;
              const awayScore = parseInt(away.score, 10) || 0;
              const homeWinner = home.winner;
              const awayWinner = away.winner;

              console.log('ESPN: ' + espnHomeName + ' ' + homeScore + ' - ' + awayScore + ' ' + espnAwayName + ' [' + status + ']');

              const isLive = LIVE_STATUSES.includes(status);
              const isFinal = FINAL_STATUSES.includes(status);

              if (!isLive && !isFinal) {
                console.log('  -> Skipping (not live/final)');
                continue;
              }

              let foundMatch = null;

              for (const roundMatches of Object.values(matchesJson.matches || {})) {
                for (const match of roundMatches) {
                  if (!match.homeTeam || !match.awayTeam) continue;

                  const jsonHome = match.homeTeam.name;
                  const jsonAway = match.awayTeam.name;

                  if (
                    (jsonHome === espnHomeName && jsonAway === espnAwayName) ||
                    (jsonHome === espnAwayName && jsonAway === espnHomeName)
                  ) {
                    if (match.status === 'completed' && match.homeScore !== null) {
                      const reversedCheck = jsonHome === espnAwayName;
                      const expectedHome = reversedCheck ? awayScore : homeScore;
                      const expectedAway = reversedCheck ? homeScore : awayScore;

                      if (match.homeScore !== expectedHome || match.awayScore !== expectedAway) {
                        continue;
                      }
                    }

                    foundMatch = match;
                    break;
                  }
                }
                if (foundMatch) break;
              }

              if (!foundMatch) {
                console.log('  -> No matching match found');
                continue;
              }

              const reversed = foundMatch.homeTeam.name === espnAwayName;
              const newHomeScore = reversed ? awayScore : homeScore;
              const newAwayScore = reversed ? homeScore : awayScore;

              const needsUpdate =
                foundMatch.homeScore !== newHomeScore ||
                foundMatch.awayScore !== newAwayScore ||
                (isLive && foundMatch.status !== 'live') ||
                (isFinal && foundMatch.status !== 'completed');

              if (!needsUpdate) {
                console.log('  -> No update needed for ' + foundMatch.id);
                continue;
              }

              foundMatch.homeScore = newHomeScore;
              foundMatch.awayScore = newAwayScore;
              foundMatch.status = isFinal ? 'completed' : 'live';

              if (isFinal) {
                if (reversed) {
                  foundMatch.winner = awayWinner ? 'home' : homeWinner ? 'away' : null;
                } else {
                  foundMatch.winner = homeWinner ? 'home' : awayWinner ? 'away' : null;
                }

                if (!foundMatch.winner && newHomeScore !== newAwayScore) {
                  foundMatch.winner = newHomeScore > newAwayScore ? 'home' : 'away';
                }
              } else {
                foundMatch.winner = null;
              }

              delete foundMatch.notes;
              delete foundMatch.homePenalties;
              delete foundMatch.awayPenalties;

              if (status === 'STATUS_FINAL_PEN') {
                foundMatch.notes = 'PKs';
              } else if (status === 'STATUS_FINAL_AET' || status === 'STATUS_END_OF_EXTRATIME') {
                foundMatch.notes = 'AET';
              }

              console.log('  -> Updated ' + foundMatch.id + ': ' + newHomeScore + '-' + newAwayScore);
              anyUpdates = true;
            }

            return anyUpdates;
          }

          async function updateStats(statsJson) {
            console.log('\nFetching ESPN World Cup leaders...');

            let leadersData;
            try {
              leadersData = await fetchJson('https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/leaders');
            } catch (e) {
              console.log('Failed to fetch ESPN leaders:', e.message);
              return false;
            }

            if (!leadersData.leaders || leadersData.leaders.length === 0) {
              console.log('No leaders data found');
              return false;
            }

            console.log('Found leaders data');
            let anyUpdates = false;

            const goalsLeaders = leadersData.leaders.find(l =>
              l.name === 'goals' || l.displayName === 'Goals' || l.abbreviation === 'G'
            );

            const assistsLeaders = leadersData.leaders.find(l =>
              l.name === 'assists' || l.displayName === 'Assists' || l.abbreviation === 'A'
            );

            if (goalsLeaders && goalsLeaders.leaders) {
              console.log('Processing ' + goalsLeaders.leaders.length + ' goal scorers');

              const newGoldenBoot = [];
              let rank = 0;
              let lastGoals = -1;

              for (let i = 0; i < Math.min(goalsLeaders.leaders.length, 20); i++) {
                const leader = goalsLeaders.leaders[i];
                const athlete = leader.athlete;
                const stats = leader.statistics || {};

                if (!athlete) continue;

                const goals = parseInt(leader.value || stats.goals || 0, 10);
                const assists = parseInt(stats.assists || 0, 10);
                const played = parseInt(stats.gamesPlayed || stats.appearances || 0, 10);

                if (goals !== lastGoals) {
                  rank = i + 1;
                  lastGoals = goals;
                }

                const teamName = athlete.team ? (athlete.team.displayName || athlete.team.name) : 'Unknown';
                const teamCode = athlete.team ? (athlete.team.abbreviation || '') : '';

                newGoldenBoot.push({
                  rank,
                  name: athlete.displayName || athlete.fullName,
                  country: normalizeName(teamName),
                  countryCode: teamCode,
                  flag: teamCode,
                  club: '',
                  played,
                  goals,
                  assists
                });
              }

              if (newGoldenBoot.length > 0) {
                for (const newPlayer of newGoldenBoot) {
                  const existing = (statsJson.goldenBoot || []).find(p =>
                    p.name.toLowerCase() === newPlayer.name.toLowerCase() ||
                    p.name.includes(newPlayer.name.split(' ').pop())
                  );
                  if (existing && existing.club) {
                    newPlayer.club = existing.club;
                  }
                }

                if (JSON.stringify(statsJson.goldenBoot || []) !== JSON.stringify(newGoldenBoot)) {
                  statsJson.goldenBoot = newGoldenBoot;
                  anyUpdates = true;
                  console.log('Updated Golden Boot with ' + newGoldenBoot.length + ' players');
                }
              }
            }

            if (assistsLeaders && assistsLeaders.leaders) {
              console.log('Processing ' + assistsLeaders.leaders.length + ' assist providers');

              const newAssists = [];
              let rank = 0;
              let lastAssists = -1;

              for (let i = 0; i < Math.min(assistsLeaders.leaders.length, 15); i++) {
                const leader = assistsLeaders.leaders[i];
                const athlete = leader.athlete;
                const stats = leader.statistics || {};

                if (!athlete) continue;

                const assists = parseInt(leader.value || stats.assists || 0, 10);
                const goals = parseInt(stats.goals || 0, 10);
                const played = parseInt(stats.gamesPlayed || stats.appearances || 0, 10);

                if (assists !== lastAssists) {
                  rank = i + 1;
                  lastAssists = assists;
                }

                const teamName = athlete.team ? (athlete.team.displayName || athlete.team.name) : 'Unknown';
                const teamCode = athlete.team ? (athlete.team.abbreviation || '') : '';

                newAssists.push({
                  rank,
                  name: athlete.displayName || athlete.fullName,
                  country: normalizeName(teamName),
                  countryCode: teamCode,
                  flag: teamCode,
                  club: '',
                  played,
                  assists,
                  goals
                });
              }

              if (newAssists.length > 0) {
                for (const newPlayer of newAssists) {
                  const existing = (statsJson.assists || []).find(p =>
                    p.name.toLowerCase() === newPlayer.name.toLowerCase() ||
                    p.name.includes(newPlayer.name.split(' ').pop())
                  );
                  if (existing && existing.club) {
                    newPlayer.club = existing.club;
                  }
                }

                if (JSON.stringify(statsJson.assists || []) !== JSON.stringify(newAssists)) {
                  statsJson.assists = newAssists;
                  anyUpdates = true;
                  console.log('Updated Assists with ' + newAssists.length + ' players');
                }
              }
            }

            if (statsJson.starPlayers && statsJson.goldenBoot && statsJson.goldenBoot.length > 0) {
              const starNames = ['Messi', 'Mbappe', 'Mbappé', 'Ronaldo', 'Haaland', 'Vinicius', 'Kane', 'Bellingham', 'Yamal'];
              let starsChanged = false;

              for (const star of statsJson.starPlayers) {
                const goldenBootEntry = statsJson.goldenBoot.find(p =>
                  starNames.some(n => p.name.includes(n) && star.name.includes(n))
                );

                if (goldenBootEntry) {
                  if (
                    star.played !== goldenBootEntry.played ||
                    star.goals !== goldenBootEntry.goals ||
                    star.assists !== goldenBootEntry.assists
                  ) {
                    star.played = goldenBootEntry.played;
                    star.goals = goldenBootEntry.goals;
                    star.assists = goldenBootEntry.assists;
                    starsChanged = true;
                  }
                }
              }

              if (starsChanged) {
                anyUpdates = true;
                console.log('Updated star players');
              }
            }

            return anyUpdates;
          }

          async function main() {
            const matchesJson = JSON.parse(fs.readFileSync('data/matches.json', 'utf8'));
            const statsJson = JSON.parse(fs.readFileSync('data/stats.json', 'utf8'));

            const matchesUpdated = await updateMatches(matchesJson);
            const bracketAdvanced = advanceBracket(matchesJson);
            const tournamentUpdated = recalculateTournament(matchesJson);

            const statsUpdated = await updateStats(statsJson);
            const statsSummaryUpdated = syncStatsSummary(matchesJson, statsJson);

            if (matchesUpdated || bracketAdvanced || tournamentUpdated || statsUpdated || statsSummaryUpdated) {
              const now = new Date().toISOString();

              if (matchesUpdated || bracketAdvanced || tournamentUpdated) {
                matchesJson.lastUpdated = now;
                fs.writeFileSync('data/matches.json', JSON.stringify(matchesJson, null, 2));
                console.log('\nmatches.json updated');
              }

              if (statsUpdated || statsSummaryUpdated) {
                statsJson.lastUpdated = now;
                fs.writeFileSync('data/stats.json', JSON.stringify(statsJson, null, 2));
                console.log('stats.json updated');
              }
            } else {
              console.log('\nNo updates needed');
            }
          }

          main().catch(e => {
            console.error('Error:', e);
            process.exit(1);
          });
